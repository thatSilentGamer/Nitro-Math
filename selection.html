<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Grade - Nitro Math</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="selection.css">
</head>
<body>

    <div id="subtitle-text">CHOOSE YOUR LEVEL</div>

    <div class="game-container">
        <div class="game-card">
            <div class="button-container">
                <button class="choice-btn btn-cyan"   onclick="selectGrade('K')">Kindergarten</button>
                <button class="choice-btn btn-blue"   onclick="selectGrade('1')">Grade 1</button>
                <button class="choice-btn btn-green"  onclick="selectGrade('2')">Grade 2</button>
                <button class="choice-btn btn-yellow" onclick="selectGrade('3')">Grade 3</button>
                <button class="choice-btn btn-orange" onclick="selectGrade('4')">Grade 4</button>
                <button class="choice-btn btn-pink"   onclick="selectGrade('5')">Grade 5</button>
                <button class="choice-btn btn-purple" onclick="selectGrade('6')">Grade 6</button>
                <button class="choice-btn btn-red"    onclick="selectGrade('7')">Grade 7</button>
                <button class="choice-btn btn-elite"  onclick="selectGrade('ALG1')">Algebra 1</button>
            </div>
        </div>
    </div>

    <br>
    <button id="back-btn" onclick="window.location.href='mode.html'">⬅ Back</button>

    <script>
        function selectGrade(grade) {
            const urlParams = new URLSearchParams(window.location.search);
            const mode = urlParams.get('mode'); 

            let targetFile = "game.html"; 
            
            if (mode === "2") {
                targetFile = "game2Player.html";
            }

            window.location.href = `${targetFile}?grade=${grade}`;
        }
    </script>

</body>
</html>
